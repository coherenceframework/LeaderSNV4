<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=744, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #FFFFFF;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .wrapper {
    width: 700px;
    padding: 36px 32px 28px;
    background: #FFFFFF;
  }
  .title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #D4A843;
    margin-bottom: 24px;
  }

  /* ─── TOP ROW: portrait + gap info ─── */
  .top-row {
    display: flex;
    align-items: flex-start;
    gap: 0;
    margin-bottom: 24px;
  }

  /* Portrait */
  .portrait-box {
    position: relative;
    width: 300px;
    height: 300px;
    flex-shrink: 0;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
  .ring-outer {
    border: 2px solid #7A756D;
    background: transparent;
  }
  .ring-core {
    width: 52px;
    height: 52px;
    background: radial-gradient(circle at 40% 38%, #2A6B6A 0%, #1A4A4A 60%, #1A1A2E 100%);
    box-shadow: 0 0 14px rgba(42,107,106,0.25), 0 0 28px rgba(42,107,106,0.1);
    z-index: 10;
  }
  .core-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 6px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-align: center;
    line-height: 1.3;
    z-index: 11;
  }
  .ring-label {
    position: absolute;
    z-index: 15;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.92);
    padding: 2px 5px;
    border-radius: 2px;
  }
  .outer-label {
    position: absolute;
    z-index: 15;
    font-size: 7px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7A756D;
    text-align: center;
  }

  /* ─── GAP PANEL (right of portrait) ─── */
  .gap-panel {
    flex: 1;
    padding: 12px 0 0 20px;
    display: flex;
    flex-direction: column;
    min-width: 240px;
  }

  /* Arrow + reading */
  .gap-arrow-row {
    display: flex;
    align-items: stretch;
    gap: 12px;
    margin-bottom: 20px;
  }
  .arrow-col {
    position: relative;
    width: 2px;
    background: #D4A843;
    min-height: 60px;
    flex-shrink: 0;
  }
  .arrow-head-up {
    position: absolute;
    top: -6px; left: -3px;
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 6px solid #D4A843;
  }
  .arrow-head-down {
    position: absolute;
    bottom: -6px; left: -3px;
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 6px solid #D4A843;
  }
  .gap-info {
    flex: 1;
    padding: 2px 0;
  }
  .gap-the-label {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #D4A843;
    margin-bottom: 4px;
  }
  .gap-reading-name {
    font-size: 18px;
    font-weight: 700;
    color: #1A1A2E;
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .gap-reading-desc {
    font-size: 9.5px;
    color: #7A756D;
    line-height: 1.4;
  }

  /* Two gap percentages */
  .gap-scores {
    display: flex;
    gap: 0;
    border-top: 1px solid #E8E5DF;
    padding-top: 16px;
  }
  .gap-score-block {
    flex: 1;
    padding: 0 12px;
  }
  .gap-score-block:first-child {
    border-right: 1px solid #E8E5DF;
    padding-left: 0;
  }
  .gap-score-block:last-child {
    padding-right: 0;
  }
  .gs-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7A756D;
    margin-bottom: 6px;
  }
  .gs-bar-track {
    width: 100%;
    height: 5px;
    background: #E8E5DF;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .gs-bar-fill {
    height: 100%;
    border-radius: 3px;
  }
  .gs-pct {
    font-size: 22px;
    font-weight: 700;
    color: #1A1A2E;
    line-height: 1;
  }
  .gs-sub {
    font-size: 8px;
    color: #B5B0A8;
    margin-top: 3px;
    line-height: 1.3;
  }

  /* ─── TERRITORIES ROW (below portrait) ─── */
  .territories {
    display: flex;
    gap: 0;
    border-top: 1px solid #E8E5DF;
    padding-top: 16px;
  }
  .territory {
    flex: 1;
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 0 14px;
  }
  .territory:first-child { padding-left: 0; }
  .territory:last-child { padding-right: 0; }
  .territory:not(:last-child) { border-right: 1px solid #E8E5DF; }
  .t-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .t-text { flex: 1; }
  .t-name {
    font-size: 11px;
    font-weight: 700;
    color: #1A1A2E;
    line-height: 1.2;
  }
  .t-desc {
    font-size: 8px;
    color: #B5B0A8;
    line-height: 1.3;
    margin-top: 1px;
  }
  .t-state {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-top: 3px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="title">The Primal Gap</div>

  <div class="top-row">
    <div class="portrait-box" id="portrait">
      <div class="ring ring-outer" id="ringOuter"></div>
      <div class="ring" id="ringCreating"></div>
      <div class="ring" id="ringRelating"></div>
      <div class="ring" id="ringBeing"></div>
      <div class="ring ring-core">
        <div class="core-label">Coherent<br>Core</div>
      </div>
    </div>

    <div class="gap-panel">
      <div class="gap-arrow-row">
        <div class="arrow-col" id="arrowCol">
          <div class="arrow-head-up"></div>
          <div class="arrow-head-down"></div>
        </div>
        <div class="gap-info">
          <div class="gap-the-label">The Gap</div>
          <div class="gap-reading-name" id="gapName">—</div>
          <div class="gap-reading-desc" id="gapDesc">—</div>
        </div>
      </div>

      <div class="gap-scores">
        <div class="gap-score-block">
          <div class="gs-label">You Reported</div>
          <div class="gs-bar-track"><div class="gs-bar-fill" id="feltBar" style="background:#2A6B6A;"></div></div>
          <div class="gs-pct" id="feltPct">—</div>
          <div class="gs-sub" id="feltSub">—</div>
        </div>
        <div class="gap-score-block">
          <div class="gs-label">Diagnostic Found</div>
          <div class="gs-bar-track"><div class="gs-bar-fill" id="diagBar" style="background:#D4A843;"></div></div>
          <div class="gs-pct" id="diagPct">—</div>
          <div class="gs-sub" id="diagSub">—</div>
        </div>
      </div>
    </div>
  </div>

  <div class="territories" id="territories">
    <div class="territory">
      <div class="t-swatch" id="swB"></div>
      <div class="t-text">
        <div class="t-name">Being</div>
        <div class="t-desc">Your ground and internal integrity</div>
        <div class="t-state" id="stB">—</div>
      </div>
    </div>
    <div class="territory">
      <div class="t-swatch" id="swR"></div>
      <div class="t-text">
        <div class="t-name">Relating</div>
        <div class="t-desc">The field between you and others</div>
        <div class="t-state" id="stR">—</div>
      </div>
    </div>
    <div class="territory">
      <div class="t-swatch" id="swC"></div>
      <div class="t-text">
        <div class="t-name">Creating</div>
        <div class="t-desc">What you are building in the world</div>
        <div class="t-state" id="stC">—</div>
      </div>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const score = parseInt(params.get('score') || '5');
  const gapType = params.get('gap_type') || 'CONSISTENT_HIGH';
  const totalSelections = parseInt(params.get('total_selections') || '8');

  const b01 = parseInt(params.get('b01') || '0');
  const b02 = parseInt(params.get('b02') || '0');
  const b04 = parseInt(params.get('b04') || '0');
  const bAmp01 = parseInt(params.get('ba01') || '0');
  const bAmp02 = parseInt(params.get('ba02') || '0');
  const bAmp04 = parseInt(params.get('ba04') || '0');

  const r03 = parseInt(params.get('r03') || '0');
  const r05 = parseInt(params.get('r05') || '0');
  const r06 = parseInt(params.get('r06') || '0');
  const rAmp03 = parseInt(params.get('ra03') || '0');
  const rAmp05 = parseInt(params.get('ra05') || '0');
  const rAmp06 = parseInt(params.get('ra06') || '0');

  const c07 = parseInt(params.get('c07') || '0');
  const c08 = parseInt(params.get('c08') || '0');
  const cAmp07 = parseInt(params.get('ca07') || '0');
  const cAmp08 = parseInt(params.get('ca08') || '0');

  const beingSel = b01 + b02 + b04;
  const beingLoaded = (b01>0?1:0) + (b02>0?1:0) + (b04>0?1:0);
  const beingMaxAmp = Math.max(bAmp01, bAmp02, bAmp04);

  const relatingSel = r03 + r05 + r06;
  const relatingLoaded = (r03>0?1:0) + (r05>0?1:0) + (r06>0?1:0);
  const relatingMaxAmp = Math.max(rAmp03, rAmp05, rAmp06);

  const creatingSel = c07 + c08;
  const creatingLoaded = (c07>0?1:0) + (c08>0?1:0);
  const creatingMaxAmp = Math.max(cAmp07, cAmp08);

  // ─── STATE LOGIC ───
  function calcState(sel, loaded, maxAmp, n) {
    if (maxAmp >= 3) return 'Fractured';
    if (sel > n * 2) return 'Fractured';
    if (sel >= n * 2 && loaded === n) return 'Fractured';
    if (maxAmp >= 2) return 'Strained';
    if (sel > n) return 'Strained';
    if (sel >= 1 && maxAmp <= 1) return 'Drifting';
    return 'Coherent';
  }

  const bState = calcState(beingSel, beingLoaded, beingMaxAmp, 3);
  const rState = calcState(relatingSel, relatingLoaded, relatingMaxAmp, 3);
  const cState = calcState(creatingSel, creatingLoaded, creatingMaxAmp, 2);

  // ─── STATE COLOURS — clearly distinct ───
  const SC = {
    'Coherent':  { ring:'rgba(42,107,106,0.22)', border:'rgba(42,107,106,0.5)',  solid:'#2A6B6A' },
    'Drifting':  { ring:'rgba(120,90,160,0.18)', border:'rgba(120,90,160,0.4)',   solid:'#785AA0' },
    'Strained':  { ring:'rgba(212,168,67,0.22)', border:'rgba(212,168,67,0.5)',   solid:'#D4A843' },
    'Fractured': { ring:'rgba(168,40,40,0.22)',  border:'rgba(168,40,40,0.5)',    solid:'#A82828' }
  };

  // ─── RING SIZES ───
  const coreR = 26;
  const cx = 150, cy = 150;
  const minT = 16, maxT = 42;

  function rT(sel, maxSel) { return minT + (sel/maxSel) * (maxT - minT); }

  const bT = rT(beingSel, 9);
  const rT2 = rT(relatingSel, 9);
  const cT = rT(creatingSel, 6);

  const bR = coreR + bT;
  const rR = bR + rT2;
  const cR = rR + cT;
  const outerR = cR + 6;

  function setRing(id, r, state) {
    const el = document.getElementById(id);
    el.style.width = (r*2) + 'px';
    el.style.height = (r*2) + 'px';
    el.style.background = SC[state].ring;
    el.style.border = '1.5px solid ' + SC[state].border;
  }

  setRing('ringBeing', bR, bState);
  setRing('ringRelating', rR, rState);
  setRing('ringCreating', cR, cState);

  const outerEl = document.getElementById('ringOuter');
  outerEl.style.width = (outerR*2) + 'px';
  outerEl.style.height = (outerR*2) + 'px';

  // ─── RING LABELS ───
  const portrait = document.getElementById('portrait');

  function addRL(text, radius, angle, color) {
    const lbl = document.createElement('div');
    lbl.className = 'ring-label';
    lbl.style.color = color;
    const rad = (angle * Math.PI) / 180;
    lbl.style.left = (cx + Math.cos(rad)*radius) + 'px';
    lbl.style.top = (cy + Math.sin(rad)*radius) + 'px';
    lbl.style.transform = 'translate(-50%,-50%)';
    lbl.textContent = text;
    portrait.appendChild(lbl);
  }

  addRL('B', (coreR+bR)/2, -45, SC[bState].solid);
  addRL('R', (bR+rR)/2, -45, SC[rState].solid);
  addRL('C', (rR+cR)/2, -45, SC[cState].solid);

  // Outer label
  const ol = document.createElement('div');
  ol.className = 'outer-label';
  ol.style.left = cx + 'px';
  ol.style.top = (cy - outerR - 12) + 'px';
  ol.style.transform = 'translateX(-50%)';
  ol.textContent = 'Operating Surface';
  portrait.appendChild(ol);

  // ─── ARROW HEIGHT matches portrait gap ───
  // Arrow should span from top of core to inner edge of outer ring
  const gapPx = outerR - coreR - 6; // subtract outer ring thickness
  document.getElementById('arrowCol').style.minHeight = Math.max(gapPx, 50) + 'px';

  // ─── GAP READING ───
  const GC = {
    'CONSISTENT_LOW':        { name:'Genuine Alignment', desc:'What you feel and what the diagnostic found confirm each other. The distance between your core and your operating surface is small.' },
    'CONSISTENT_HIGH':       { name:'Honest Distance',   desc:'You feel the distance and the diagnostic confirms it. The gap is real, visible to you, and structurally present.' },
    'CONTRADICTION_DRIVEN':  { name:'Hidden Gap',        desc:'You reported high alignment but the diagnostic detected significant structural load between your core and your operating surface.' },
    'CONTRADICTION_INTERNAL':{ name:'Internal Origin',    desc:'You reported significant distance but the diagnostic found minimal structural friction. The source is beneath the structure.' }
  };
  const gc = GC[gapType] || GC['CONSISTENT_HIGH'];
  document.getElementById('gapName').textContent = gc.name;
  document.getElementById('gapDesc').textContent = gc.desc;

  // ─── GAP PERCENTAGES ───
  // Both expressed as gap from coherent potential
  const feltGapPct = Math.round(((10 - score) / 10) * 100);
  const diagGapPct = Math.round((totalSelections / 24) * 100);

  document.getElementById('feltBar').style.width = feltGapPct + '%';
  document.getElementById('feltPct').textContent = feltGapPct + '%';
  document.getElementById('feltSub').textContent = 'gap against your potential';

  document.getElementById('diagBar').style.width = diagGapPct + '%';
  document.getElementById('diagPct').textContent = diagGapPct + '%';
  document.getElementById('diagSub').textContent = 'gap detected by diagnostic';

  // Colour the bars to match — both measuring gap so same colour family
  document.getElementById('feltBar').style.background = '#1A1A2E';
  document.getElementById('diagBar').style.background = '#D4A843';

  // ─── TERRITORY LEGEND ───
  function setT(swId, stId, state) {
    document.getElementById(swId).style.background = SC[state].solid;
    const el = document.getElementById(stId);
    el.textContent = state;
    el.style.color = SC[state].solid;
  }
  setT('swB','stB', bState);
  setT('swR','stR', rState);
  setT('swC','stC', cState);
</script>
</body>
</html>
