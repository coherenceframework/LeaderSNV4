<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=744, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #FFFFFF;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .wrapper {
    width: 700px;
    padding: 40px 36px 32px;
    background: #FFFFFF;
  }
  .title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #D4A843;
    margin-bottom: 28px;
  }
  .main {
    display: flex;
    align-items: flex-start;
    gap: 32px;
  }

  /* ─── PORTRAIT ─── */
  .portrait-container {
    position: relative;
    width: 320px;
    height: 320px;
    flex-shrink: 0;
  }
  .ring {
    position: absolute;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Outer shell */
  .ring-outer {
    border: 2px solid #7A756D;
    background: transparent;
  }
  .outer-label {
    position: absolute;
    z-index: 15;
    font-size: 7px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7A756D;
    text-align: center;
  }

  /* Core */
  .ring-core {
    width: 56px;
    height: 56px;
    background: radial-gradient(circle at 40% 38%, #2A6B6A 0%, #1A4A4A 60%, #1A1A2E 100%);
    box-shadow: 0 0 16px rgba(42, 107, 106, 0.25), 0 0 32px rgba(42, 107, 106, 0.1);
    z-index: 10;
  }
  .core-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 6.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-align: center;
    line-height: 1.3;
    z-index: 11;
  }

  /* Ring labels */
  .ring-label {
    position: absolute;
    z-index: 15;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    background: rgba(255,255,255,0.9);
    padding: 2px 5px;
    border-radius: 2px;
  }

  /* ─── GAP ARROW + READING (right side of portrait) ─── */
  .gap-group {
    position: absolute;
    z-index: 20;
    display: flex;
    align-items: flex-start;
    gap: 8px;
  }
  .gap-arrow-container {
    position: relative;
    width: 2px;
  }
  .gap-line {
    width: 2px;
    background: #D4A843;
  }
  .arrow-head-up {
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-bottom: 7px solid #D4A843;
    position: absolute;
    top: -7px;
    left: -3px;
  }
  .arrow-head-down {
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
    border-top: 7px solid #D4A843;
    position: absolute;
    left: -3px;
  }
  .gap-text-group {
    padding-top: 4px;
  }
  .gap-the-gap {
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #D4A843;
    margin-bottom: 6px;
  }
  .gap-reading-name {
    font-size: 14px;
    font-weight: 700;
    color: #D4A843;
    line-height: 1.2;
  }
  .gap-reading-desc {
    font-size: 8px;
    color: #7A756D;
    line-height: 1.3;
    margin-top: 3px;
    max-width: 100px;
  }

  /* ─── LEGEND ─── */
  .legend {
    flex: 1;
    padding-top: 0;
  }
  .legend-heading {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7A756D;
    margin-bottom: 10px;
  }
  .legend-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 14px;
  }
  .legend-swatch {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    margin-top: 2px;
    flex-shrink: 0;
  }
  .legend-text { flex: 1; }
  .legend-name {
    font-size: 11px;
    font-weight: 700;
    color: #1A1A2E;
    line-height: 1.2;
  }
  .legend-desc {
    font-size: 9px;
    color: #B5B0A8;
    line-height: 1.3;
    margin-top: 1px;
  }
  .legend-state {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .legend-divider {
    width: 100%;
    height: 1px;
    background: #E8E5DF;
    margin: 14px 0;
  }

  /* Alignment comparison */
  .alignment-compare {
    display: flex;
    gap: 0;
    margin-top: 4px;
  }
  .align-block {
    flex: 1;
    text-align: center;
    padding: 10px 8px;
  }
  .align-block.felt {
    border-right: 1px solid #E8E5DF;
  }
  .align-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7A756D;
    margin-bottom: 4px;
  }
  .align-bar-track {
    width: 100%;
    height: 6px;
    background: #E8E5DF;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 4px;
  }
  .align-bar-fill {
    height: 100%;
    border-radius: 3px;
  }
  .align-bar-fill.felt-fill { background: #2A6B6A; }
  .align-bar-fill.diag-fill { background: #D4A843; }
  .align-pct {
    font-size: 16px;
    font-weight: 700;
    color: #1A1A2E;
  }
  .align-sub {
    font-size: 8px;
    color: #B5B0A8;
    margin-top: 1px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="title">The Primal Gap</div>
  <div class="main">
    <div class="portrait-container" id="portrait">
      <div class="ring ring-outer" id="ringOuter"></div>
      <div class="ring" id="ringCreating"></div>
      <div class="ring" id="ringRelating"></div>
      <div class="ring" id="ringBeing"></div>
      <div class="ring ring-core">
        <div class="core-label">Coherent<br>Core</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-heading">Territories</div>

      <div class="legend-row">
        <div class="legend-swatch" id="swatchBeing"></div>
        <div class="legend-text">
          <div class="legend-name">Being</div>
          <div class="legend-desc">Your ground and internal integrity</div>
          <div class="legend-state" id="beingState">—</div>
        </div>
      </div>
      <div class="legend-row">
        <div class="legend-swatch" id="swatchRelating"></div>
        <div class="legend-text">
          <div class="legend-name">Relating</div>
          <div class="legend-desc">The field between you and others</div>
          <div class="legend-state" id="relatingState">—</div>
        </div>
      </div>
      <div class="legend-row">
        <div class="legend-swatch" id="swatchCreating"></div>
        <div class="legend-text">
          <div class="legend-name">Creating</div>
          <div class="legend-desc">What you are building in the world</div>
          <div class="legend-state" id="creatingState">—</div>
        </div>
      </div>

      <div class="legend-divider"></div>

      <div class="alignment-compare">
        <div class="align-block felt">
          <div class="align-label">You Reported</div>
          <div class="align-bar-track"><div class="align-bar-fill felt-fill" id="feltBar"></div></div>
          <div class="align-pct" id="feltPct">—</div>
          <div class="align-sub" id="feltRaw">— / 10</div>
        </div>
        <div class="align-block">
          <div class="align-label">Diagnostic Found</div>
          <div class="align-bar-track"><div class="align-bar-fill diag-fill" id="diagBar"></div></div>
          <div class="align-pct" id="diagPct">—</div>
          <div class="align-sub" id="diagRaw">— / 24 friction points</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const score = parseInt(params.get('score') || '5');
  const gapType = params.get('gap_type') || 'CONSISTENT_HIGH';
  const totalSelections = parseInt(params.get('total_selections') || '8');

  // Being: clusters 01, 02, 04
  const b01 = parseInt(params.get('b01') || '0');
  const b02 = parseInt(params.get('b02') || '0');
  const b04 = parseInt(params.get('b04') || '0');
  const bAmp01 = parseInt(params.get('ba01') || '0');
  const bAmp02 = parseInt(params.get('ba02') || '0');
  const bAmp04 = parseInt(params.get('ba04') || '0');

  // Relating: clusters 03, 05, 06
  const r03 = parseInt(params.get('r03') || '0');
  const r05 = parseInt(params.get('r05') || '0');
  const r06 = parseInt(params.get('r06') || '0');
  const rAmp03 = parseInt(params.get('ra03') || '0');
  const rAmp05 = parseInt(params.get('ra05') || '0');
  const rAmp06 = parseInt(params.get('ra06') || '0');

  // Creating: clusters 07, 08
  const c07 = parseInt(params.get('c07') || '0');
  const c08 = parseInt(params.get('c08') || '0');
  const cAmp07 = parseInt(params.get('ca07') || '0');
  const cAmp08 = parseInt(params.get('ca08') || '0');

  const beingSel = b01 + b02 + b04;
  const beingMaxAmp = Math.max(bAmp01, bAmp02, bAmp04);
  const beingLoaded = (b01>0?1:0) + (b02>0?1:0) + (b04>0?1:0);

  const relatingSel = r03 + r05 + r06;
  const relatingMaxAmp = Math.max(rAmp03, rAmp05, rAmp06);
  const relatingLoaded = (r03>0?1:0) + (r05>0?1:0) + (r06>0?1:0);

  const creatingSel = c07 + c08;
  const creatingMaxAmp = Math.max(cAmp07, cAmp08);
  const creatingLoaded = (c07>0?1:0) + (c08>0?1:0);

  // ─── TERRITORY STATE ───
  function calcState(sel, loaded, maxAmp, n) {
    if (maxAmp >= 3) return 'Fractured';
    if (sel > n * 2) return 'Fractured';
    if (sel >= n * 2 && loaded === n) return 'Fractured';
    if (maxAmp >= 2) return 'Strained';
    if (sel > n) return 'Strained';
    if (sel >= 1 && maxAmp <= 1) return 'Drifting';
    return 'Coherent';
  }

  const bState = calcState(beingSel, beingLoaded, beingMaxAmp, 3);
  const rState = calcState(relatingSel, relatingLoaded, relatingMaxAmp, 3);
  const cState = calcState(creatingSel, creatingLoaded, creatingMaxAmp, 2);

  // ─── STATE COLOURS ───
  const stateColor = {
    'Coherent':  { ring: 'rgba(42, 107, 106, 0.25)', border: 'rgba(42, 107, 106, 0.45)', swatch: '#2A6B6A', text: '#2A6B6A' },
    'Drifting':  { ring: 'rgba(100, 120, 140, 0.2)', border: 'rgba(100, 120, 140, 0.4)', swatch: '#64788C', text: '#64788C' },
    'Strained':  { ring: 'rgba(212, 168, 67, 0.25)', border: 'rgba(212, 168, 67, 0.5)', swatch: '#D4A843', text: '#D4A843' },
    'Fractured': { ring: 'rgba(168, 40, 40, 0.2)', border: 'rgba(168, 40, 40, 0.45)', swatch: '#A82828', text: '#A82828' }
  };

  // ─── RING SIZES ───
  const coreR = 28;
  const minT = 18;
  const maxT = 44;

  function ringT(sel, maxSel) { return minT + (sel / maxSel) * (maxT - minT); }

  const bT = ringT(beingSel, 9);
  const rT = ringT(relatingSel, 9);
  const cT = ringT(creatingSel, 6);

  const bR = coreR + bT;
  const rR = bR + rT;
  const cR = rR + cT;
  const outerR = cR + 8;

  function setRing(id, radius, state) {
    const el = document.getElementById(id);
    el.style.width = (radius * 2) + 'px';
    el.style.height = (radius * 2) + 'px';
    el.style.background = stateColor[state].ring;
    el.style.border = '1.5px solid ' + stateColor[state].border;
  }

  setRing('ringBeing', bR, bState);
  setRing('ringRelating', rR, rState);
  setRing('ringCreating', cR, cState);

  const outerEl = document.getElementById('ringOuter');
  outerEl.style.width = (outerR * 2) + 'px';
  outerEl.style.height = (outerR * 2) + 'px';

  // ─── RING LABELS ───
  const portrait = document.getElementById('portrait');

  function addLabel(text, radius, angle, color) {
    const lbl = document.createElement('div');
    lbl.className = 'ring-label';
    lbl.style.color = color;
    const rad = (angle * Math.PI) / 180;
    const x = 160 + Math.cos(rad) * radius;
    const y = 160 + Math.sin(rad) * radius;
    lbl.style.left = x + 'px';
    lbl.style.top = y + 'px';
    lbl.style.transform = 'translate(-50%, -50%)';
    lbl.textContent = text;
    portrait.appendChild(lbl);
  }

  addLabel('B', (coreR + bR) / 2, -45, stateColor[bState].text);
  addLabel('R', (bR + rR) / 2, -45, stateColor[rState].text);
  addLabel('C', (rR + cR) / 2, -45, stateColor[cState].text);

  // Outer label
  const outerLbl = document.createElement('div');
  outerLbl.className = 'outer-label';
  outerLbl.style.left = '160px';
  outerLbl.style.top = (160 - outerR - 14) + 'px';
  outerLbl.style.transform = 'translateX(-50%)';
  outerLbl.textContent = 'Operating Surface';
  portrait.appendChild(outerLbl);

  // ─── GAP ARROW + READING (positioned right of portrait) ───
  const arrowX = 160 + outerR + 12;
  // Arrow from top of core to inner edge of outer ring
  const arrowTop = 160 - outerR + 2;  // inner edge of outer ring (top)
  const arrowBottom = 160 - coreR;     // top of core
  const arrowH = arrowBottom - arrowTop;

  const gapGroup = document.createElement('div');
  gapGroup.className = 'gap-group';
  gapGroup.style.left = arrowX + 'px';
  gapGroup.style.top = arrowTop + 'px';

  // Arrow
  const arrowC = document.createElement('div');
  arrowC.className = 'gap-arrow-container';
  arrowC.style.height = arrowH + 'px';

  const gLine = document.createElement('div');
  gLine.className = 'gap-line';
  gLine.style.height = arrowH + 'px';
  arrowC.appendChild(gLine);

  const headUp = document.createElement('div');
  headUp.className = 'arrow-head-up';
  arrowC.appendChild(headUp);

  const headDown = document.createElement('div');
  headDown.className = 'arrow-head-down';
  headDown.style.bottom = '0px';
  arrowC.appendChild(headDown);

  gapGroup.appendChild(arrowC);

  // Text group
  const gapConfig = {
    'CONSISTENT_LOW': { name: 'Genuine Alignment', desc: 'Your felt alignment and structural load confirm each other' },
    'CONSISTENT_HIGH': { name: 'Honest Distance', desc: 'You see the gap clearly and the diagnostic confirms it' },
    'CONTRADICTION_DRIVEN': { name: 'Hidden Gap', desc: 'High felt alignment but significant structural load detected' },
    'CONTRADICTION_INTERNAL': { name: 'Internal Origin', desc: 'Significant felt distance but minimal structural friction' }
  };
  const gc = gapConfig[gapType] || gapConfig['CONSISTENT_HIGH'];

  const textG = document.createElement('div');
  textG.className = 'gap-text-group';

  const theGap = document.createElement('div');
  theGap.className = 'gap-the-gap';
  theGap.textContent = 'The Gap';
  textG.appendChild(theGap);

  const gName = document.createElement('div');
  gName.className = 'gap-reading-name';
  gName.textContent = gc.name;
  textG.appendChild(gName);

  const gDesc = document.createElement('div');
  gDesc.className = 'gap-reading-desc';
  gDesc.textContent = gc.desc;
  textG.appendChild(gDesc);

  gapGroup.appendChild(textG);
  portrait.appendChild(gapGroup);

  // ─── LEGEND STATES + SWATCHES ───
  function setLegendState(id, swatchId, state) {
    const el = document.getElementById(id);
    el.textContent = state;
    el.style.color = stateColor[state].text;
    document.getElementById(swatchId).style.background = stateColor[state].swatch;
  }
  setLegendState('beingState', 'swatchBeing', bState);
  setLegendState('relatingState', 'swatchRelating', rState);
  setLegendState('creatingState', 'swatchCreating', cState);

  // ─── ALIGNMENT COMPARISON (normalised to %) ───
  const feltPct = Math.round((score / 10) * 100);
  // Invert friction: high friction = low alignment
  const diagAlignPct = Math.round(((24 - totalSelections) / 24) * 100);

  document.getElementById('feltBar').style.width = feltPct + '%';
  document.getElementById('feltPct').textContent = feltPct + '%';
  document.getElementById('feltRaw').textContent = score + ' / 10';

  document.getElementById('diagBar').style.width = diagAlignPct + '%';
  document.getElementById('diagPct').textContent = diagAlignPct + '%';
  document.getElementById('diagRaw').textContent = totalSelections + ' / 24 friction points';
</script>
</body>
</html>
