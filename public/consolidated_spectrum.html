<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #F3F1EC;
  }

  .wrapper {
    width: 800px;
    padding: 24px 0;
    background: #F3F1EC;
  }

  .state-cards {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .state-card {
    border-radius: 8px;
    padding: 20px 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .state-card.coherent { width: 116px; }
  .state-card.driven { width: 140px; }
  .state-card.strained { width: 164px; }
  .state-card.drifting { width: 164px; }
  .state-card.fractured { width: 184px; }

  .state-card .state-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .state-card .state-desc {
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    line-height: 1.45;
  }

  .state-card.active {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    transform: scale(1.02);
  }
  .state-card.active .state-name {
    color: #FFFFFF;
    font-size: 15px;
  }
  .state-card.active .state-desc {
    color: rgba(255, 255, 255, 0.88);
    font-size: 12px;
  }
  .state-card.active::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255, 255, 255, 0.5);
  }

  .state-card.inactive .state-name {
    opacity: 0.65;
  }
  .state-card.inactive .state-desc {
    opacity: 0.55;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="state-cards" id="stateCards"></div>
  
  <svg viewBox="0 0 800 130" width="800" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="specGrad" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" stop-color="#3A7D44"/>
        <stop offset="25%" stop-color="#4A6FA5"/>
        <stop offset="50%" stop-color="#D4A843"/>
        <stop offset="75%" stop-color="#7B2D8E"/>
        <stop offset="100%" stop-color="#A82828"/>
      </linearGradient>
    </defs>
    <rect x="0" y="20" width="800" height="11" rx="5.5" fill="#E8E5DF"/>
    <rect x="0" y="20" width="800" height="11" rx="5.5" fill="url(#specGrad)" opacity="0.12"/>
    <rect x="0" y="20" id="specFill" width="87" height="11" rx="5.5" fill="#3A7D44"/>
    <line x1="116" y1="16" x2="116" y2="58" stroke="#D5D2CC" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="264" y1="16" x2="264" y2="58" stroke="#D5D2CC" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="436" y1="16" x2="436" y2="58" stroke="#D5D2CC" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="608" y1="16" x2="608" y2="58" stroke="#D5D2CC" stroke-width="1" stroke-dasharray="3 3"/>
    <!-- Diagnostic needle (rendered first so self-report sits on top) -->
    <line id="needleLine" x1="87" y1="12" x2="87" y2="38" stroke="#1A1A2E" stroke-width="2.5"/>
    <circle id="needleDot" cx="87" cy="25.5" r="5" fill="#1A1A2E"/>
    <!-- Self-reported marker (rendered second so it sits on top) -->
    <circle id="selfReportDot" cx="480" cy="25.5" r="9" fill="none" stroke="#7A756D" stroke-width="2.5"/>
    <circle id="selfReportDotInner" cx="480" cy="25.5" r="4" fill="#7A756D"/>
    <text id="selfReportLabel" x="480" y="8" text-anchor="middle" font-size="11" font-weight="700" fill="#7A756D" font-family="DM Sans, sans-serif">60% SELF-REPORTED RESISTANCE</text>
    <text x="0" y="55" font-size="12" fill="#B5B0A8" font-family="DM Sans, sans-serif">Signal arrives in the moment</text>
    <text x="800" y="55" text-anchor="end" font-size="12" fill="#B5B0A8" font-family="DM Sans, sans-serif">Signal may never arrive</text>
    <text id="pctText" x="87" y="85" text-anchor="middle" font-size="32" font-weight="700" fill="#1A1A2E" font-family="DM Sans, sans-serif">17<tspan font-size="18" fill="#7A756D">%</tspan></text>
    <text id="diagLabel" x="87" y="98" text-anchor="middle" font-size="9" font-weight="600" fill="#1A1A2E" font-family="DM Sans, sans-serif">DIAGNOSTIC</text>
    <text id="resLine1" x="87" y="110" text-anchor="middle" font-size="10" font-weight="600" letter-spacing="1.2" fill="#D4A843" font-family="DM Sans, sans-serif">RESISTANCE TO</text>
    <text id="resLine2" x="87" y="121" text-anchor="middle" font-size="10" font-weight="600" letter-spacing="1.2" fill="#D4A843" font-family="DM Sans, sans-serif">COHERENT CORE</text>
  </svg>
</div>

<script>
  var states = [
    { id: 'COHERENT', name: 'Coherent', desc: 'System in alignment. Friction navigated, not avoided.', color: '#3A7D44', className: 'coherent' },
    { id: 'DRIVEN', name: 'Driven', desc: 'High performance. Invisible cost accumulating.', color: '#4A6FA5', className: 'driven' },
    { id: 'STRAINED', name: 'Strained', desc: 'Real load with real awareness. Effort vs design.', color: '#D4A843', className: 'strained' },
    { id: 'DRIFTING', name: 'Drifting', desc: 'Diffuse friction. The primary signal has faded.', color: '#7B2D8E', className: 'drifting' },
    { id: 'FRACTURED', name: 'Fractured', desc: 'Comprehensive load. The signal may not be arriving.', color: '#A82828', className: 'fractured' }
  ];

  var params = new URLSearchParams(window.location.search);
  var activeState = (params.get('state') || 'DRIVEN').toUpperCase();
  var diagGapPct = parseInt(params.get('pct') || '17');
  var selfReportPct = parseInt(params.get('self') || '60');

  var stateCardsContainer = document.getElementById('stateCards');

  states.forEach(function(s) {
    var isActive = s.id === activeState;
    var card = document.createElement('div');
    card.className = 'state-card ' + s.className + ' ' + (isActive ? 'active' : 'inactive');

    if (isActive) {
      card.style.background = s.color;
    } else {
      var r = parseInt(s.color.substring(1, 3), 16);
      var g = parseInt(s.color.substring(3, 5), 16);
      var b = parseInt(s.color.substring(5, 7), 16);
      card.style.background = 'rgba(' + r + ',' + g + ',' + b + ',0.1)';
    }

    card.innerHTML = '<div class="state-name">' + s.name + '</div><div class="state-desc">' + s.desc + '</div>';

    if (!isActive) {
      card.querySelector('.state-name').style.color = s.color;
      card.querySelector('.state-desc').style.color = s.color;
    }

    stateCardsContainer.appendChild(card);
  });

  var stateMap = {
    'COHERENT': 'Coherent', 'DRIVEN': 'Driven', 'STRAINED': 'Strained',
    'DRIFTING': 'Drifting', 'FRACTURED': 'Fractured'
  };
  var overallState = stateMap[activeState] || activeState;

  var SC = {
    Coherent: '#3A7D44', Driven: '#4A6FA5', Strained: '#D4A843',
    Drifting: '#7B2D8E', Fractured: '#A82828'
  };

  var specW = 800, minN = 24, maxN = specW - 24;
  var needleX = Math.max(minN, Math.min(maxN, (diagGapPct / 100) * specW));

  document.getElementById('specFill').setAttribute('fill', SC[overallState] || SC.Coherent);
  document.getElementById('specFill').setAttribute('width', Math.max(6, needleX));
  document.getElementById('needleLine').setAttribute('x1', needleX);
  document.getElementById('needleLine').setAttribute('x2', needleX);
  document.getElementById('needleDot').setAttribute('cx', needleX);

  var pctText = document.getElementById('pctText');
  var diagLabel = document.getElementById('diagLabel');
  var resLine1 = document.getElementById('resLine1');
  var resLine2 = document.getElementById('resLine2');

  pctText.innerHTML = diagGapPct + '<tspan font-size="18" fill="#7A756D">%</tspan>';

  var textAnchor = 'middle';
  if (diagGapPct <= 8) {
    textAnchor = 'start';
    needleX = Math.max(0, needleX);
  } else if (diagGapPct >= 92) {
    textAnchor = 'end';
    needleX = Math.min(800, needleX);
  }

  pctText.setAttribute('x', needleX);
  pctText.setAttribute('text-anchor', textAnchor);
  diagLabel.setAttribute('x', needleX);
  diagLabel.setAttribute('text-anchor', textAnchor);
  resLine1.setAttribute('x', needleX);
  resLine1.setAttribute('text-anchor', textAnchor);
  resLine2.setAttribute('x', needleX);
  resLine2.setAttribute('text-anchor', textAnchor);

  // Position self-report marker
  var selfReportX = Math.max(minN, Math.min(maxN, (selfReportPct / 100) * specW));
  document.getElementById('selfReportDot').setAttribute('cx', selfReportX);
  document.getElementById('selfReportDotInner').setAttribute('cx', selfReportX);
  
  var selfReportLabel = document.getElementById('selfReportLabel');
  selfReportLabel.setAttribute('x', selfReportX);
  selfReportLabel.textContent = selfReportPct + '% SELF-REPORTED';
  
  var selfTextAnchor = 'middle';
  if (selfReportPct <= 8) {
    selfTextAnchor = 'start';
  } else if (selfReportPct >= 92) {
    selfTextAnchor = 'end';
  }
  selfReportLabel.setAttribute('text-anchor', selfTextAnchor);
</script>
</body>
</html>
