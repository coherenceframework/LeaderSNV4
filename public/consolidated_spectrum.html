<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=672, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&family=DM+Sans:wght@400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #F3F1EC;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 20px;
  }

  .wrapper {
    width: 800px;
    background: #F3F1EC;
    padding: 24px 0;
  }

  /* State Cards Section */
  .state-cards {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }

  .state-card {
    border-radius: 8px;
    padding: 20px 14px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s ease;
  }

  /* Balanced widths: 768px available (800 - 32px gaps) */
  /* Coherent gets minimum viable width, others scale from there */
  .state-card.coherent { width: 116px; }
  .state-card.driven { width: 140px; }
  .state-card.strained { width: 164px; }
  .state-card.drifting { width: 164px; }
  .state-card.fractured { width: 184px; }

  .state-card .state-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .state-card .state-desc {
    font-family: 'Inter', sans-serif;
    font-size: 11.5px;
    line-height: 1.45;
  }

  /* Active card */
  .state-card.active {
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
    transform: scale(1.02);
  }
  .state-card.active .state-name {
    color: #FFFFFF;
    font-size: 15px;
  }
  .state-card.active .state-desc {
    color: rgba(255, 255, 255, 0.88);
    font-size: 12px;
  }
  .state-card.active::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255, 255, 255, 0.5);
  }

  /* Inactive card */
  .state-card.inactive .state-name {
    opacity: 0.65;
  }
  .state-card.inactive .state-desc {
    opacity: 0.55;
  }

  /* Spectrum Section */
  .spectrum-section {
    position: relative;
  }

  .spectrum-container {
    position: relative;
    height: 60px;
    margin-bottom: 8px;
  }

  .bottom-labels {
    position: relative;
    width: 100%;
    margin-top: 8px;
  }

  .needle-percentage {
    position: absolute;
    font-family: 'DM Sans', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: #1A1A2E;
    white-space: nowrap;
    transform: translateX(-50%);
  }

  .needle-percentage .unit {
    font-size: 18px;
    color: #7A756D;
  }

  .resistance-label {
    position: absolute;
    top: 40px;
    white-space: nowrap;
    transform: translateX(-50%);
  }

  .resistance-label-line1,
  .resistance-label-line2 {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    color: #D4A843;
    text-transform: uppercase;
    line-height: 1.3;
    text-align: center;
  }

  .temporal-anchors {
    display: flex;
    justify-content: space-between;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    color: #B5B0A8;
    margin-top: 0;
  }
</style>
</head>
<body>
<div class="wrapper">
  <!-- State Cards -->
  <div class="state-cards" id="stateCards"></div>

  <!-- Spectrum Gauge -->
  <div class="spectrum-section">
    <div class="spectrum-container">
      <svg viewBox="0 0 800 60" width="100%" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="specGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3A7D44"/>
            <stop offset="25%" stop-color="#4A6FA5"/>
            <stop offset="50%" stop-color="#D4A843"/>
            <stop offset="75%" stop-color="#7B2D8E"/>
            <stop offset="100%" stop-color="#A82828"/>
          </linearGradient>
        </defs>
        <!-- Track -->
        <rect x="0" y="20" width="800" height="11" rx="5.5" fill="#E8E5DF"/>
        <rect x="0" y="20" width="800" height="11" rx="5.5" fill="url(#specGrad)" opacity="0.12"/>
        <rect x="0" y="20" id="specFill" width="87" height="11" rx="5.5" fill="#3A7D44"/>
        <!-- Zone dividers aligned with card boundaries: 116, 264, 436, 608 -->
        <line x1="116" y1="16" x2="116" y2="58" stroke="#D5D2CC" stroke-width="1" stroke-dasharray="3 3"/>
        <line x1="264" y1="16" x2="264" y2="58" stroke="#D5D2CC" stroke-width="1" stroke-dasharray="3 3"/>
        <line x1="436" y1="16" x2="436" y2="58" stroke="#D5D2CC" stroke-width="1" stroke-dasharray="3 3"/>
        <line x1="608" y1="16" x2="608" y2="58" stroke="#D5D2CC" stroke-width="1" stroke-dasharray="3 3"/>
        <!-- Needle -->
        <line id="needleLine" x1="87" y1="12" x2="87" y2="38" stroke="#1A1A2E" stroke-width="2.5"/>
        <circle id="needleDot" cx="87" cy="25.5" r="5" fill="#1A1A2E"/>
        <!-- Temporal anchors -->
        <text x="0" y="55" font-size="11" fill="#B5B0A8" font-family="DM Sans, sans-serif">Signal arrives in the moment</text>
        <text x="800" y="55" text-anchor="end" font-size="11" fill="#B5B0A8" font-family="DM Sans, sans-serif">Signal may never arrive</text>
      </svg>
    </div>

    <div class="bottom-labels">
      <div class="needle-percentage" id="needlePercentage">0<span class="unit">%</span></div>
      <div class="resistance-label" id="resistanceLabel">
        <div class="resistance-label-line1">RESISTANCE TO</div>
        <div class="resistance-label-line2">COHERENT CORE</div>
      </div>
    </div>
  </div>
</div>

<script>
  var states = [
    { id: 'COHERENT', name: 'Coherent', desc: 'System in alignment. Friction navigated, not avoided.', color: '#3A7D44', className: 'coherent' },
    { id: 'DRIVEN', name: 'Driven', desc: 'High performance. Invisible cost accumulating.', color: '#4A6FA5', className: 'driven' },
    { id: 'STRAINED', name: 'Strained', desc: 'Real load with real awareness. Effort vs design.', color: '#D4A843', className: 'strained' },
    { id: 'DRIFTING', name: 'Drifting', desc: 'Diffuse friction. The primary signal has faded.', color: '#7B2D8E', className: 'drifting' },
    { id: 'FRACTURED', name: 'Fractured', desc: 'Comprehensive load. The signal may not be arriving.', color: '#A82828', className: 'fractured' }
  ];

  var params = new URLSearchParams(window.location.search);
  var activeState = (params.get('state') || 'DRIVEN').toUpperCase();
  var diagGapPct = parseInt(params.get('pct') || '17');

  var stateCardsContainer = document.getElementById('stateCards');

  // Render state cards
  states.forEach(function(s) {
    var isActive = s.id === activeState;
    var card = document.createElement('div');
    card.className = 'state-card ' + s.className + ' ' + (isActive ? 'active' : 'inactive');

    if (isActive) {
      card.style.background = s.color;
    } else {
      var r = parseInt(s.color.substring(1, 3), 16);
      var g = parseInt(s.color.substring(3, 5), 16);
      var b = parseInt(s.color.substring(5, 7), 16);
      card.style.background = 'rgba(' + r + ',' + g + ',' + b + ',0.1)';
    }

    card.innerHTML = '<div class="state-name">' + s.name + '</div><div class="state-desc">' + s.desc + '</div>';

    if (!isActive) {
      card.querySelector('.state-name').style.color = s.color;
      card.querySelector('.state-desc').style.color = s.color;
    }

    stateCardsContainer.appendChild(card);
  });

  // Update spectrum
  var stateMap = {
    'COHERENT': 'Coherent', 'DRIVEN': 'Driven', 'STRAINED': 'Strained',
    'DRIFTING': 'Drifting', 'FRACTURED': 'Fractured', 'QUALIFIED': 'Coherent'
  };
  var overallState = stateMap[activeState] || activeState;

  var SC = {
    Coherent: '#3A7D44', Driven: '#4A6FA5', Strained: '#D4A843',
    Drifting: '#7B2D8E', Fractured: '#A82828'
  };

  var specW = 800, minN = 24, maxN = specW - 24;
  var needleX = Math.max(minN, Math.min(maxN, (diagGapPct / 100) * specW));

  document.getElementById('specFill').setAttribute('fill', SC[overallState] || SC.Coherent);
  document.getElementById('specFill').setAttribute('width', Math.max(6, needleX));
  document.getElementById('needleLine').setAttribute('x1', needleX);
  document.getElementById('needleLine').setAttribute('x2', needleX);
  document.getElementById('needleDot').setAttribute('cx', needleX);

  document.getElementById('needlePercentage').innerHTML = diagGapPct + '<span class="unit">%</span>';

  // Position percentage and resistance label at needle position
  var percentageEl = document.getElementById('needlePercentage');
  var resistanceEl = document.getElementById('resistanceLabel');
  
  // Handle edge cases for label positioning
  var labelX = needleX;
  var textAnchor = 'center';
  
  if (diagGapPct <= 8) {
    // Near left edge - align left
    labelX = 0;
    percentageEl.style.left = '0';
    percentageEl.style.transform = 'translateX(0)';
    percentageEl.style.textAlign = 'left';
    resistanceEl.style.left = '0';
    resistanceEl.style.transform = 'translateX(0)';
    resistanceEl.querySelector('.resistance-label-line1').style.textAlign = 'left';
    resistanceEl.querySelector('.resistance-label-line2').style.textAlign = 'left';
  } else if (diagGapPct >= 92) {
    // Near right edge - align right
    labelX = specW;
    percentageEl.style.left = specW + 'px';
    percentageEl.style.transform = 'translateX(-100%)';
    percentageEl.style.textAlign = 'right';
    resistanceEl.style.left = specW + 'px';
    resistanceEl.style.transform = 'translateX(-100%)';
    resistanceEl.querySelector('.resistance-label-line1').style.textAlign = 'right';
    resistanceEl.querySelector('.resistance-label-line2').style.textAlign = 'right';
  } else {
    // Normal centered positioning
    percentageEl.style.left = needleX + 'px';
    resistanceEl.style.left = needleX + 'px';
  }
</script>
</body>
</html>
