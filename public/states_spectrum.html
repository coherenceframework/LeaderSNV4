<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=800, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: #FFFFFF;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .wrapper {
    width: 780px;
    padding: 32px 24px;
    background: #FFFFFF;
  }

  .spectrum {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
  }

  .state-card {
    flex: 1;
    border-radius: 8px;
    padding: 20px 12px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .state-card .state-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .state-card .state-desc {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px;
    line-height: 1.4;
  }

  /* Active card styling */
  .state-card.active {
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    transform: scale(1.03);
  }
  .state-card.active .state-name {
    color: #FFFFFF;
    font-size: 14px;
  }
  .state-card.active .state-desc {
    color: rgba(255, 255, 255, 0.8);
    font-size: 11px;
  }
  .state-card.active::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: rgba(255, 255, 255, 0.5);
  }

  /* Inactive card styling — state colour text on light tinted bg */
  .state-card.inactive .state-name {
    opacity: 0.6;
  }
  .state-card.inactive .state-desc {
    opacity: 0.5;
  }

  .indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-top: 14px;
    border-top: 1px solid #E8E5DF;
  }

  .indicator-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .indicator-text {
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: #7A756D;
    line-height: 1.4;
  }

  .indicator-text strong {
    font-weight: 600;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="spectrum" id="spectrum"></div>
  <div class="indicator">
    <div class="indicator-dot" id="indicator-dot"></div>
    <div class="indicator-text">
      Your current reading is <strong id="state-label"></strong>.
      This is a signal of current conditions &mdash; not a permanent definition.
    </div>
  </div>
</div>

<script>
  var states = [
    { id: 'FRACTURED', name: 'Fractured', desc: 'Comprehensive load. The signal may not be arriving.', color: '#A82828' },
    { id: 'DRIFTING', name: 'Drifting', desc: 'Diffuse friction. The primary signal has faded.', color: '#7B2D8E' },
    { id: 'STRAINED', name: 'Strained', desc: 'Real load with real awareness. Effort vs design.', color: '#D4A843' },
    { id: 'DRIVEN', name: 'Driven', desc: 'High performance. Invisible cost accumulating.', color: '#4A6FA5' },
    { id: 'COHERENT', name: 'Coherent', desc: 'System in alignment. Friction navigated, not avoided.', color: '#2A6B6A' }
  ];

  var params = new URLSearchParams(window.location.search);
  var activeState = (params.get('state') || 'DRIVEN').toUpperCase();
  var isQualified = activeState === 'QUALIFIED';

  var spectrum = document.getElementById('spectrum');
  var stateLabel = document.getElementById('state-label');
  var indicatorDot = document.getElementById('indicator-dot');

  var activeColor = '#D4A843';

  states.forEach(function(s) {
    var isActive = !isQualified && s.id === activeState;
    var card = document.createElement('div');
    card.className = 'state-card ' + (isActive ? 'active' : 'inactive');

    if (isActive) {
      card.style.background = s.color;
      activeColor = s.color;
    } else {
      var r = parseInt(s.color.substring(1, 3), 16);
      var g = parseInt(s.color.substring(3, 5), 16);
      var b = parseInt(s.color.substring(5, 7), 16);
      card.style.background = 'rgba(' + r + ',' + g + ',' + b + ',0.08)';
      // Use state colour for text on inactive cards
      var nameEl = card.querySelector('.state-name');
      var descEl = card.querySelector('.state-desc');
    }

    card.innerHTML = '<div class="state-name">' + s.name + '</div><div class="state-desc">' + s.desc + '</div>';

    if (!isActive) {
      card.querySelector('.state-name').style.color = s.color;
      card.querySelector('.state-desc').style.color = s.color;
    }
    spectrum.appendChild(card);
  });

  // Set indicator dot to active state colour
  indicatorDot.style.background = activeColor;

  // Set label
  if (isQualified) {
    stateLabel.textContent = 'Qualified Read';
    stateLabel.style.color = '#1A1A2E';
  } else {
    var found = states.find(function(s) { return s.id === activeState; });
    stateLabel.textContent = found ? found.name : activeState;
    stateLabel.style.color = activeColor;
  }
</script>
</body>
</html>
