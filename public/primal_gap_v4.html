<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=744, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #FFFFFF;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }
  .wrapper {
    width: 700px;
    padding: 40px 36px 32px;
    background: #FFFFFF;
  }
  .title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: #D4A843;
    margin-bottom: 28px;
  }

  .main {
    display: flex;
    align-items: flex-start;
    gap: 36px;
  }

  /* ─── PORTRAIT ─── */
  .portrait-container {
    position: relative;
    width: 300px;
    height: 300px;
    flex-shrink: 0;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  /* Outer shell — operating surface */
  .ring-outer {
    border: 1.5px solid #B5B0A8;
    background: transparent;
  }

  /* B/R/C rings */
  .ring-creating {
    background: rgba(180, 170, 155, 0.12);
    border: 1px solid rgba(180, 170, 155, 0.2);
  }
  .ring-relating {
    background: rgba(155, 145, 130, 0.15);
    border: 1px solid rgba(155, 145, 130, 0.25);
  }
  .ring-being {
    background: rgba(130, 120, 105, 0.18);
    border: 1px solid rgba(130, 120, 105, 0.3);
  }

  /* Core */
  .ring-core {
    width: 56px;
    height: 56px;
    background: radial-gradient(circle at 40% 38%, #2A6B6A 0%, #1A4A4A 60%, #1A1A2E 100%);
    box-shadow: 0 0 16px rgba(42, 107, 106, 0.25), 0 0 32px rgba(42, 107, 106, 0.1);
    z-index: 10;
  }
  .core-label {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 6.5px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-align: center;
    line-height: 1.3;
    z-index: 11;
  }

  /* Gap arrow */
  .gap-arrow {
    position: absolute;
    z-index: 20;
  }
  .gap-line {
    position: absolute;
    width: 2px;
    background: #D4A843;
  }
  .gap-arrow-head-top, .gap-arrow-head-bottom {
    position: absolute;
    width: 0; height: 0;
    border-left: 4px solid transparent;
    border-right: 4px solid transparent;
  }
  .gap-arrow-head-top {
    border-bottom: 6px solid #D4A843;
  }
  .gap-arrow-head-bottom {
    border-top: 6px solid #D4A843;
  }
  .gap-label {
    position: absolute;
    z-index: 21;
    font-size: 7px;
    font-weight: 700;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: #D4A843;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    transform: rotate(180deg);
  }

  /* Ring labels (B, R, C) */
  .ring-label {
    position: absolute;
    z-index: 15;
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(100, 92, 82, 0.6);
    background: rgba(255,255,255,0.85);
    padding: 1px 4px;
    border-radius: 2px;
  }

  /* ─── LEGEND ─── */
  .legend {
    flex: 1;
    padding-top: 4px;
  }

  .legend-section {
    margin-bottom: 16px;
  }

  .legend-heading {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #7A756D;
    margin-bottom: 10px;
  }

  .legend-row {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    margin-bottom: 12px;
  }

  .legend-swatch {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-top: 3px;
    flex-shrink: 0;
    border: 1px solid rgba(0,0,0,0.1);
  }

  .legend-text {
    flex: 1;
  }

  .legend-name {
    font-size: 11px;
    font-weight: 700;
    color: #1A1A2E;
    line-height: 1.2;
  }

  .legend-desc {
    font-size: 9px;
    color: #B5B0A8;
    line-height: 1.3;
    margin-top: 1px;
  }

  .legend-state {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }

  .state-coherent { color: #2A6B6A; }
  .state-drifting { color: #7A756D; }
  .state-strained { color: #D4A843; }
  .state-fractured { color: #C62828; }

  .legend-divider {
    width: 100%;
    height: 1px;
    background: #E8E5DF;
    margin: 14px 0;
  }

  /* Scores section */
  .scores {
    display: flex;
    gap: 20px;
    margin-top: 4px;
  }

  .score-block {
    flex: 1;
  }

  .score-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: #7A756D;
    margin-bottom: 2px;
  }

  .score-value {
    font-size: 22px;
    font-weight: 700;
    color: #1A1A2E;
    line-height: 1.1;
  }

  .score-value .unit {
    font-size: 11px;
    font-weight: 500;
    color: #B5B0A8;
  }

  .score-sub {
    font-size: 8px;
    color: #B5B0A8;
    margin-top: 1px;
  }

  .gap-reading-block {
    margin-top: 2px;
  }

  .gap-reading-name {
    font-size: 16px;
    font-weight: 700;
    color: #D4A843;
    line-height: 1.2;
  }

  .gap-reading-desc {
    font-size: 9px;
    color: #7A756D;
    line-height: 1.3;
    margin-top: 2px;
  }
</style>
</head>
<body>
<div class="wrapper">
  <div class="title">The Primal Gap</div>

  <div class="main">
    <div class="portrait-container" id="portrait">
      <div class="ring ring-outer" id="ringOuter"></div>
      <div class="ring ring-creating" id="ringCreating"></div>
      <div class="ring ring-relating" id="ringRelating"></div>
      <div class="ring ring-being" id="ringBeing"></div>
      <div class="ring ring-core">
        <div class="core-label">Coherent<br>Core</div>
      </div>
    </div>

    <div class="legend">
      <div class="legend-section">
        <div class="legend-heading">Territories</div>

        <div class="legend-row">
          <div class="legend-swatch" style="background: rgba(130, 120, 105, 0.4);"></div>
          <div class="legend-text">
            <div class="legend-name">Being</div>
            <div class="legend-desc">Your ground and internal integrity</div>
            <div class="legend-state" id="beingState">—</div>
          </div>
        </div>

        <div class="legend-row">
          <div class="legend-swatch" style="background: rgba(155, 145, 130, 0.4);"></div>
          <div class="legend-text">
            <div class="legend-name">Relating</div>
            <div class="legend-desc">The field between you and others</div>
            <div class="legend-state" id="relatingState">—</div>
          </div>
        </div>

        <div class="legend-row">
          <div class="legend-swatch" style="background: rgba(180, 170, 155, 0.4);"></div>
          <div class="legend-text">
            <div class="legend-name">Creating</div>
            <div class="legend-desc">What you are building in the world</div>
            <div class="legend-state" id="creatingState">—</div>
          </div>
        </div>
      </div>

      <div class="legend-divider"></div>

      <div class="scores">
        <div class="score-block">
          <div class="score-label">You Reported</div>
          <div class="score-value" id="feltScore">— <span class="unit">/ 10</span></div>
          <div class="score-sub">Felt alignment</div>
        </div>
        <div class="score-block">
          <div class="score-label">Diagnostic Found</div>
          <div class="score-value" id="diagScore">— <span class="unit">/ 24</span></div>
          <div class="score-sub">Friction points detected</div>
        </div>
      </div>

      <div class="legend-divider"></div>

      <div class="gap-reading-block">
        <div class="score-label">Gap Reading</div>
        <div class="gap-reading-name" id="gapName">—</div>
        <div class="gap-reading-desc" id="gapDesc">—</div>
      </div>
    </div>
  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const score = parseInt(params.get('score') || '5');
  const gapType = params.get('gap_type') || 'CONSISTENT_HIGH';
  const totalSelections = parseInt(params.get('total_selections') || '8');

  // Being: clusters 01, 02, 04
  const b01 = parseInt(params.get('b01') || '0');
  const b02 = parseInt(params.get('b02') || '0');
  const b04 = parseInt(params.get('b04') || '0');
  const bAmp01 = parseInt(params.get('ba01') || '0');
  const bAmp02 = parseInt(params.get('ba02') || '0');
  const bAmp04 = parseInt(params.get('ba04') || '0');

  // Relating: clusters 03, 05, 06
  const r03 = parseInt(params.get('r03') || '0');
  const r05 = parseInt(params.get('r05') || '0');
  const r06 = parseInt(params.get('r06') || '0');
  const rAmp03 = parseInt(params.get('ra03') || '0');
  const rAmp05 = parseInt(params.get('ra05') || '0');
  const rAmp06 = parseInt(params.get('ra06') || '0');

  // Creating: clusters 07, 08
  const c07 = parseInt(params.get('c07') || '0');
  const c08 = parseInt(params.get('c08') || '0');
  const cAmp07 = parseInt(params.get('ca07') || '0');
  const cAmp08 = parseInt(params.get('ca08') || '0');

  // Territory totals
  const beingSel = b01 + b02 + b04;
  const beingLoaded = (b01 > 0 ? 1 : 0) + (b02 > 0 ? 1 : 0) + (b04 > 0 ? 1 : 0);
  const beingMaxAmp = Math.max(bAmp01, bAmp02, bAmp04);

  const relatingSel = r03 + r05 + r06;
  const relatingLoaded = (r03 > 0 ? 1 : 0) + (r05 > 0 ? 1 : 0) + (r06 > 0 ? 1 : 0);
  const relatingMaxAmp = Math.max(rAmp03, rAmp05, rAmp06);

  const creatingSel = c07 + c08;
  const creatingLoaded = (c07 > 0 ? 1 : 0) + (c08 > 0 ? 1 : 0);
  const creatingMaxAmp = Math.max(cAmp07, cAmp08);

  // ─── TERRITORY STATE LOGIC ───
  function calcState(sel, loaded, maxAmp, numClusters) {
    if (maxAmp >= 3) return 'Fractured';
    if (sel > numClusters * 2) return 'Fractured';
    if (sel >= numClusters * 2 && loaded === numClusters) return 'Fractured';
    if (maxAmp >= 2) return 'Strained';
    if (sel > numClusters) return 'Strained';
    if (sel >= 1 && maxAmp <= 1) return 'Drifting';
    return 'Coherent';
  }

  const beingState = calcState(beingSel, beingLoaded, beingMaxAmp, 3);
  const relatingState = calcState(relatingSel, relatingLoaded, relatingMaxAmp, 3);
  const creatingState = calcState(creatingSel, creatingLoaded, creatingMaxAmp, 2);

  // ─── RING SIZES ───
  // Core = 56px. Each ring adds thickness based on selections.
  // Minimum ring = core + 20px per territory (thin but visible)
  // Maximum ring grows with load
  const coreR = 28; // core radius
  const minThickness = 16;
  const maxThickness = 42;

  function ringThickness(sel, maxSel) {
    const factor = sel / maxSel;
    return minThickness + (factor * (maxThickness - minThickness));
  }

  const beingThick = ringThickness(beingSel, 9);
  const relatingThick = ringThickness(relatingSel, 9);
  const creatingThick = ringThickness(creatingSel, 6);

  const beingR = coreR + beingThick;
  const relatingR = beingR + relatingThick;
  const creatingR = relatingR + creatingThick;
  const outerR = creatingR + 6;

  document.getElementById('ringBeing').style.width = (beingR * 2) + 'px';
  document.getElementById('ringBeing').style.height = (beingR * 2) + 'px';
  document.getElementById('ringRelating').style.width = (relatingR * 2) + 'px';
  document.getElementById('ringRelating').style.height = (relatingR * 2) + 'px';
  document.getElementById('ringCreating').style.width = (creatingR * 2) + 'px';
  document.getElementById('ringCreating').style.height = (creatingR * 2) + 'px';
  document.getElementById('ringOuter').style.width = (outerR * 2) + 'px';
  document.getElementById('ringOuter').style.height = (outerR * 2) + 'px';

  // Intensify ring colors based on state
  const stateColors = {
    'Coherent': { bg: 0.06, border: 0.12 },
    'Drifting': { bg: 0.12, border: 0.2 },
    'Strained': { bg: 0.2, border: 0.3 },
    'Fractured': { bg: 0.32, border: 0.45 }
  };

  function applyRingState(el, state, baseR, baseG, baseB) {
    const sc = stateColors[state];
    el.style.background = `rgba(${baseR}, ${baseG}, ${baseB}, ${sc.bg})`;
    el.style.borderColor = `rgba(${baseR}, ${baseG}, ${baseB}, ${sc.border})`;
  }

  applyRingState(document.getElementById('ringBeing'), beingState, 100, 92, 80);
  applyRingState(document.getElementById('ringRelating'), relatingState, 120, 110, 95);
  applyRingState(document.getElementById('ringCreating'), creatingState, 140, 130, 115);

  // ─── RING LABELS ───
  const portrait = document.getElementById('portrait');

  function addRingLabel(text, radius, angle) {
    const lbl = document.createElement('div');
    lbl.className = 'ring-label';
    const rad = (angle * Math.PI) / 180;
    const x = 150 + Math.cos(rad) * radius;
    const y = 150 + Math.sin(rad) * radius;
    lbl.style.left = x + 'px';
    lbl.style.top = y + 'px';
    lbl.style.transform = 'translate(-50%, -50%)';
    lbl.textContent = text;
    portrait.appendChild(lbl);
  }

  addRingLabel('B', (coreR + beingR) / 2, -90);
  addRingLabel('R', (beingR + relatingR) / 2, -90);
  addRingLabel('C', (relatingR + creatingR) / 2, -90);

  // ─── GAP ARROW ───
  const arrowX = 150 + outerR + 14;
  const arrowTop = 150 - outerR;
  const arrowBottom = 150 + coreR;
  const arrowHeight = arrowBottom - arrowTop;

  // Line
  const line = document.createElement('div');
  line.className = 'gap-line';
  line.style.position = 'absolute';
  line.style.left = arrowX + 'px';
  line.style.top = arrowTop + 'px';
  line.style.height = arrowHeight + 'px';
  portrait.appendChild(line);

  // Top arrowhead
  const headTop = document.createElement('div');
  headTop.className = 'gap-arrow-head-top';
  headTop.style.position = 'absolute';
  headTop.style.left = (arrowX - 3) + 'px';
  headTop.style.top = (arrowTop - 6) + 'px';
  portrait.appendChild(headTop);

  // Bottom arrowhead
  const headBot = document.createElement('div');
  headBot.className = 'gap-arrow-head-bottom';
  headBot.style.position = 'absolute';
  headBot.style.left = (arrowX - 3) + 'px';
  headBot.style.top = arrowBottom + 'px';
  portrait.appendChild(headBot);

  // Gap label
  const gapLbl = document.createElement('div');
  gapLbl.className = 'gap-label';
  gapLbl.style.left = (arrowX + 10) + 'px';
  gapLbl.style.top = (arrowTop + arrowHeight / 2 - 20) + 'px';
  gapLbl.textContent = 'The Gap';
  portrait.appendChild(gapLbl);

  // ─── STATE LABELS ───
  function stateClass(state) { return 'state-' + state.toLowerCase(); }

  const bs = document.getElementById('beingState');
  bs.textContent = beingState;
  bs.className = 'legend-state ' + stateClass(beingState);

  const rs = document.getElementById('relatingState');
  rs.textContent = relatingState;
  rs.className = 'legend-state ' + stateClass(relatingState);

  const cs = document.getElementById('creatingState');
  cs.textContent = creatingState;
  cs.className = 'legend-state ' + stateClass(creatingState);

  // ─── SCORES ───
  document.getElementById('feltScore').innerHTML = score + ' <span class="unit">/ 10</span>';
  document.getElementById('diagScore').innerHTML = totalSelections + ' <span class="unit">/ 24</span>';

  // ─── GAP READING ───
  const gapConfig = {
    'CONSISTENT_LOW': {
      name: 'Genuine Alignment',
      desc: 'What you feel and what the diagnostic found are consistent. The distance is small.'
    },
    'CONSISTENT_HIGH': {
      name: 'Honest Distance',
      desc: 'What you feel and what the diagnostic found are consistent. You see the gap clearly.'
    },
    'CONTRADICTION_DRIVEN': {
      name: 'Hidden Gap',
      desc: 'You reported high alignment but the diagnostic found significant structural load.'
    },
    'CONTRADICTION_INTERNAL': {
      name: 'Internal Origin',
      desc: 'You reported significant distance but the diagnostic found minimal structural friction.'
    }
  };

  const gc = gapConfig[gapType] || gapConfig['CONSISTENT_HIGH'];
  document.getElementById('gapName').textContent = gc.name;
  document.getElementById('gapDesc').textContent = gc.desc;
</script>
</body>
</html>
