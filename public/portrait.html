<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=520, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F3F1EC;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .wrapper {
    width: 520px;
    background: #F3F1EC;
    text-align: center;
    overflow: hidden;
  }
</style>
</head>
<body>
<div class="wrapper">
  <svg id="portSvg" width="520" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script>
var P=new URLSearchParams(window.location.search);

var b01=parseInt(P.get('b01')||'0'),b02=parseInt(P.get('b02')||'0'),b04=parseInt(P.get('b04')||'0');
var ba01=parseInt(P.get('ba01')||'0'),ba02=parseInt(P.get('ba02')||'0'),ba04=parseInt(P.get('ba04')||'0');
var r03=parseInt(P.get('r03')||'0'),r05=parseInt(P.get('r05')||'0'),r06=parseInt(P.get('r06')||'0');
var ra03=parseInt(P.get('ra03')||'0'),ra05=parseInt(P.get('ra05')||'0'),ra06=parseInt(P.get('ra06')||'0');
var c07=parseInt(P.get('c07')||'0'),c08=parseInt(P.get('c08')||'0');
var ca07=parseInt(P.get('ca07')||'0'),ca08=parseInt(P.get('ca08')||'0');

var beingScore=(b01*ba01)+(b02*ba02)+(b04*ba04);
var relatingScore=(r03*ra03)+(r05*ra05)+(r06*ra06);
var creatingScore=(c07*ca07)+(c08*ca08);

var stateMap={
  'COHERENT':'Coherent','DRIVEN':'Driven','STRAINED':'Strained',
  'DRIFTING':'Drifting','FRACTURED':'Fractured','QUALIFIED':'Coherent'
};
var overallState=stateMap[P.get('state')||'COHERENT']||'Coherent';
var overallPct=P.get('pct')||'0';
var bState=stateMap[P.get('bstate')||'COHERENT']||'Coherent';
var rState=stateMap[P.get('rstate')||'COHERENT']||'Coherent';
var cState=stateMap[P.get('cstate')||'COHERENT']||'Coherent';

var SC={
  Coherent:{ring:'rgba(42,107,106,0.25)',border:'rgba(42,107,106,0.55)',solid:'#3A7D44'},
  Driven:{ring:'rgba(74,111,165,0.22)',border:'rgba(74,111,165,0.5)',solid:'#4A6FA5'},
  Strained:{ring:'rgba(212,168,67,0.25)',border:'rgba(212,168,67,0.55)',solid:'#D4A843'},
  Drifting:{ring:'rgba(123,45,142,0.22)',border:'rgba(123,45,142,0.45)',solid:'#7B2D8E'},
  Fractured:{ring:'rgba(168,40,40,0.25)',border:'rgba(168,40,40,0.55)',solid:'#A82828'}
};

var stateOrder=['Coherent','Driven','Strained','Drifting','Fractured'];
var stateIndex=stateOrder.indexOf(overallState);

var svg=document.getElementById('portSvg');
var coreR=36, minT=26, maxT=46;
function ringT(score,maxScore){return minT+(score/maxScore)*(maxT-minT);}

var bT=ringT(beingScore,27), relTh=ringT(relatingScore,27), creTh=ringT(creatingScore,18);
var bR=coreR+bT, rR=bR+relTh, cR=rR+creTh;
var gapBand=24;
var outerR=cR+gapBand;

var svgW=520, svgH=340;
var cx=svgW/2;
var cy=svgH-18;

var maxZoneR=cy-12;
var remainingStates=stateOrder.length-1-stateIndex;
var zoneStep=remainingStates>0?(maxZoneR-outerR)/remainingStates:0;

var zoneRadii=[outerR];
for(var i=1;i<=remainingStates;i++){
  zoneRadii.push(outerR+(zoneStep*i));
}

svg.setAttribute('viewBox','0 0 '+svgW+' '+svgH);
svg.setAttribute('height',svgH);
svg.style.display='block';
svg.style.margin='0 auto';

function svgEl(tag,attrs){
  var el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(var k in attrs) el.setAttribute(k,attrs[k]);
  return el;
}
function svgTxt(x,y,text,attrs){
  var el=svgEl('text',{x:x,y:y});
  for(var k in attrs) el.setAttribute(k,attrs[k]);
  el.textContent=text;
  svg.appendChild(el);
}

// Defs
var defs=svgEl('defs',{});
var rg=svgEl('radialGradient',{id:'cg',cx:'40%',cy:'38%',r:'60%'});
rg.appendChild(svgEl('stop',{offset:'0%','stop-color':'#3A7D44'}));
rg.appendChild(svgEl('stop',{offset:'100%','stop-color':'#1A1A2E'}));
defs.appendChild(rg);
svg.appendChild(defs);

// ═══ OUTER STATE ZONE LINES — visible, normal weight ═══
for(var i=stateIndex+1;i<stateOrder.length;i++){
  var zIdx=i-stateIndex;
  var zR=zoneRadii[zIdx];
  var zName=stateOrder[i];
  var zSolid=SC[zName].solid;
  // Solid colour dashed lines — clearly visible
  svg.appendChild(svgEl('circle',{
    cx:cx,cy:cy,r:zR,
    fill:'none',stroke:zSolid,'stroke-width':'1.2','stroke-dasharray':'5 4',opacity:'0.45'
  }));
  // Zone label centred between this line and the one below
  var prevR=zoneRadii[zIdx-1];
  var labelR=(zR+prevR)/2;
  var labelY=cy-labelR;
  if(labelY>10 && labelY<svgH-10){
    svgTxt(cx, labelY+4, zName, {
      'text-anchor':'middle','font-size':'10','font-weight':'600',
      fill:zSolid,opacity:'0.45','font-family':'DM Sans, sans-serif'
    });
  }
}

// ═══ OPERATING SURFACE — bold, distinct from zone lines ═══
svg.appendChild(svgEl('circle',{
  cx:cx,cy:cy,r:outerR,
  fill:'none',stroke:SC[overallState].solid,
  'stroke-width':'3','stroke-dasharray':'8 4'
}));
// Label in gap band — white background for readability
var osMidR=(outerR+cR)/2;
var osLabelY=cy-osMidR-7;
// White rect behind text
svg.appendChild(svgEl('rect',{
  x:cx-130,y:osLabelY-12,width:'260',height:'32',
  rx:'4',fill:'#FFFFFF',opacity:'0.9'
}));
svgTxt(cx, osLabelY, 'ADAPTED SELF', {
  'text-anchor':'middle','font-size':'12','font-weight':'700',
  'letter-spacing':'1.5',fill:SC[overallState].solid,'font-family':'DM Sans, sans-serif'
});
svgTxt(cx, osLabelY+15, overallState + ' \u2014 ' + overallPct + '% resistance', {
  'text-anchor':'middle','font-size':'11','font-weight':'600',
  'letter-spacing':'0.5',fill:SC[overallState].solid,'font-family':'DM Sans, sans-serif'
});

// ═══ TERRITORY RINGS ═══
[{r:cR,s:cState},{r:rR,s:rState},{r:bR,s:bState}].forEach(function(d){
  svg.appendChild(svgEl('circle',{cx:cx,cy:cy,r:d.r,fill:SC[d.s].ring,stroke:SC[d.s].border,'stroke-width':'1.5'}));
});

// ═══ CORE ═══
svg.appendChild(svgEl('circle',{cx:cx,cy:cy,r:coreR,fill:'url(#cg)'}));
svgTxt(cx, cy-6, 'COHERENT', {
  'text-anchor':'middle','font-size':'9','font-weight':'700',
  'letter-spacing':'1.8',fill:'rgba(255,255,255,0.9)','font-family':'DM Sans, sans-serif'
});
svgTxt(cx, cy+7, 'CORE', {
  'text-anchor':'middle','font-size':'9','font-weight':'700',
  'letter-spacing':'1.8',fill:'rgba(255,255,255,0.9)','font-family':'DM Sans, sans-serif'
});

// ═══ B/R/C LABELS ═══
[
  {midR:(coreR+bR)/2, letter:'B', state:bState},
  {midR:(bR+rR)/2,    letter:'R', state:rState},
  {midR:(rR+cR)/2,    letter:'C', state:cState}
].forEach(function(d){
  var lx=cx+d.midR, ly=cy;
  svg.appendChild(svgEl('circle',{cx:lx,cy:ly,r:'14',fill:'#FFFFFF',stroke:SC[d.state].solid,'stroke-width':'2'}));
  svgTxt(lx, ly+5, d.letter, {
    'text-anchor':'middle','font-size':'13','font-weight':'700',
    fill:SC[d.state].solid,'font-family':'DM Sans, sans-serif'
  });
});

// ═══ PASSED-THROUGH STATES ═══
var passedStates=[];
for(var i=1;i<=stateIndex;i++){
  passedStates.push(stateOrder[i]);
}
if(passedStates.length>0){
  var startX=16, spacing=60;
  for(var i=0;i<passedStates.length;i++){
    var ps=passedStates[i];
    svg.appendChild(svgEl('circle',{
      cx:startX+(i*spacing)+4, cy:svgH-8, r:'3',
      fill:SC[ps].solid, opacity:'0.45'
    }));
    svgTxt(startX+(i*spacing)+12, svgH-5, ps, {
      'text-anchor':'start','font-size':'8','font-weight':'500',
      fill:SC[ps].solid, opacity:'0.45','font-family':'DM Sans, sans-serif'
    });
  }
}

// ═══ GAP ARROWS ═══
var ac='#D4A843';
function drawArrow(angleDeg){
  var rad=(angleDeg*Math.PI)/180;
  var iE=coreR+3, oE=cR-2;
  var x1=cx+Math.cos(rad)*iE, y1=cy+Math.sin(rad)*iE;
  var x2=cx+Math.cos(rad)*oE, y2=cy+Math.sin(rad)*oE;
  svg.appendChild(svgEl('line',{x1:x1,y1:y1,x2:x2,y2:y2,stroke:ac,'stroke-width':'2'}));
  var hL=8, hA=24*Math.PI/180;
  svg.appendChild(svgEl('polygon',{
    points:x2+','+y2+' '+(x2-hL*Math.cos(rad-hA))+','+(y2-hL*Math.sin(rad-hA))+' '+(x2-hL*Math.cos(rad+hA))+','+(y2-hL*Math.sin(rad+hA)),
    fill:ac
  }));
  svg.appendChild(svgEl('polygon',{
    points:x1+','+y1+' '+(x1+hL*Math.cos(rad-hA))+','+(y1+hL*Math.sin(rad-hA))+' '+(x1+hL*Math.cos(rad+hA))+','+(y1+hL*Math.sin(rad+hA)),
    fill:ac
  }));
}
drawArrow(-60);
drawArrow(-90);
drawArrow(-120);
</script>
</body>
</html>
