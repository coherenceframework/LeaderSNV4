<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=520, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #F3F1EC;
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }
  .wrapper {
    width: 520px;
    background: #F3F1EC;
    text-align: center;
    overflow: hidden;
  }
</style>
</head>
<body>
<div class="wrapper">
  <svg id="portSvg" width="520" xmlns="http://www.w3.org/2000/svg"></svg>
</div>

<script>
var P=new URLSearchParams(window.location.search);

// Territory scores from scoring engine
var beingScore=parseInt(P.get('bscore')||'0');
var relatingScore=parseInt(P.get('rscore')||'0');
var creatingScore=parseInt(P.get('cscore')||'0');

var stateMap={
  'COHERENT':'Coherent','DRIVEN':'Driven','STRAINED':'Strained',
  'DRIFTING':'Drifting','FRACTURED':'Fractured','QUALIFIED':'Coherent'
};
var overallState=stateMap[P.get('state')||'COHERENT']||'Coherent';
var overallPct=P.get('pct')||'0';
var bState=stateMap[P.get('bstate')||'COHERENT']||'Coherent';
var rState=stateMap[P.get('rstate')||'COHERENT']||'Coherent';
var cState=stateMap[P.get('cstate')||'COHERENT']||'Coherent';

var SC={
  Coherent:{fill:'rgba(58,125,68,0.35)',border:'rgba(58,125,68,0.65)',solid:'#3A7D44'},
  Driven:{fill:'rgba(74,111,165,0.35)',border:'rgba(74,111,165,0.65)',solid:'#4A6FA5'},
  Strained:{fill:'rgba(212,168,67,0.35)',border:'rgba(212,168,67,0.65)',solid:'#D4A843'},
  Drifting:{fill:'rgba(123,45,142,0.35)',border:'rgba(123,45,142,0.65)',solid:'#7B2D8E'},
  Fractured:{fill:'rgba(168,40,40,0.35)',border:'rgba(168,40,40,0.65)',solid:'#A82828'}
};

var stateOrder=['Coherent','Driven','Strained','Drifting','Fractured'];
var stateIndex=stateOrder.indexOf(overallState);

var svg=document.getElementById('portSvg');
var coreR=36;
var svgW=520, svgH=340;
var cx=svgW/2;
var cy=svgH-18;

// All five state zones at FIXED absolute positions
var stateZoneRadii = {
  'Coherent': 138,
  'Driven': 170,
  'Strained': 202,
  'Drifting': 234,
  'Fractured': 266
};

// Operating Surface scales between Coherent (0%) and Fractured (100%) positions
var resistancePct = parseFloat(overallPct) || 0;
var outerR = 138 + (resistancePct / 100) * (266 - 138);

// Small visual gap between outermost ring and Operating Surface
var visualGap = 3;
var availableSpace = outerR - coreR - visualGap;

// Rings ALWAYS fill entire available space, sized proportionally to each other
var bNorm = beingScore / 27;
var rNorm = relatingScore / 27;
var cNorm = creatingScore / 18;
var totalNorm = bNorm + rNorm + cNorm;

// If all scores are zero, distribute evenly
if (totalNorm === 0) {
  var bT = availableSpace / 3;
  var relTh = availableSpace / 3;
  var creTh = availableSpace / 3;
} else {
  // Distribute space proportionally
  var bT = availableSpace * (bNorm / totalNorm);
  var relTh = availableSpace * (rNorm / totalNorm);
  var creTh = availableSpace * (cNorm / totalNorm);
}

// Ring boundaries
var bR = coreR + bT;
var rR = bR + relTh;
var cR = rR + creTh;

svg.setAttribute('viewBox','0 0 '+svgW+' '+svgH);
svg.setAttribute('height',svgH);
svg.style.display='block';
svg.style.margin='0 auto';

function svgEl(tag,attrs){
  var el=document.createElementNS('http://www.w3.org/2000/svg',tag);
  for(var k in attrs) el.setAttribute(k,attrs[k]);
  return el;
}
function svgTxt(x,y,text,attrs){
  var el=svgEl('text',{x:x,y:y});
  for(var k in attrs) el.setAttribute(k,attrs[k]);
  el.textContent=text;
  svg.appendChild(el);
}

// Defs
var defs=svgEl('defs',{});

// Radial gradient for core
var rg=svgEl('radialGradient',{id:'cg',cx:'40%',cy:'38%',r:'60%'});
rg.appendChild(svgEl('stop',{offset:'0%','stop-color':'#3A7D44'}));
rg.appendChild(svgEl('stop',{offset:'100%','stop-color':'#1A1A2E'}));
defs.appendChild(rg);

// Clip paths for rings (so they don't overlap)
var clipBeing = svgEl('clipPath',{id:'clipB'});
clipBeing.appendChild(svgEl('circle',{cx:cx,cy:cy,r:bR}));
var maskBCore = svgEl('circle',{cx:cx,cy:cy,r:coreR});
clipBeing.appendChild(maskBCore);
defs.appendChild(clipBeing);

var clipRelating = svgEl('clipPath',{id:'clipR'});
clipRelating.appendChild(svgEl('circle',{cx:cx,cy:cy,r:rR}));
var maskRInner = svgEl('circle',{cx:cx,cy:cy,r:bR});
clipRelating.appendChild(maskRInner);
defs.appendChild(clipRelating);

var clipCreating = svgEl('clipPath',{id:'clipC'});
clipCreating.appendChild(svgEl('circle',{cx:cx,cy:cy,r:cR}));
var maskCInner = svgEl('circle',{cx:cx,cy:cy,r:rR});
clipCreating.appendChild(maskCInner);
defs.appendChild(clipCreating);

svg.appendChild(defs);

// STATE ZONE LINES - FIXED positions, show zones beyond current state
for(var i=stateIndex+1;i<stateOrder.length;i++){
  var zName=stateOrder[i];
  var zR=stateZoneRadii[zName];
  var zSolid=SC[zName].solid;
  
  svg.appendChild(svgEl('circle',{
    cx:cx,cy:cy,r:zR,
    fill:'none',stroke:zSolid,'stroke-width':'1.2','stroke-dasharray':'5 4',opacity:'0.45'
  }));
  
  var prevName=stateOrder[i-1];
  var prevR=stateZoneRadii[prevName];
  var labelR=(zR+prevR)/2;
  var labelY=cy-labelR;
  
  if(labelY>10 && labelY<svgH-10){
    svgTxt(cx, labelY+4, zName, {
      'text-anchor':'middle','font-size':'10','font-weight':'600',
      fill:zSolid,opacity:'0.45','font-family':'DM Sans, sans-serif'
    });
  }
}

// OPERATING SURFACE - dashed line
svg.appendChild(svgEl('circle',{
  cx:cx,cy:cy,r:outerR,
  fill:'none',stroke:SC[overallState].solid,
  'stroke-width':'3','stroke-dasharray':'8 4'
}));

// TERRITORY RINGS - drawn from inside out, each fills only its band
// Being ring (innermost, around core)
svg.appendChild(svgEl('circle',{
  cx:cx,cy:cy,r:bR,
  fill:SC[bState].fill,stroke:SC[bState].border,'stroke-width':'1.5'
}));

// Relating ring (middle band)
svg.appendChild(svgEl('circle',{
  cx:cx,cy:cy,r:rR,
  fill:SC[rState].fill,stroke:SC[rState].border,'stroke-width':'1.5'
}));

// Creating ring (outer band)
svg.appendChild(svgEl('circle',{
  cx:cx,cy:cy,r:cR,
  fill:SC[cState].fill,stroke:SC[cState].border,'stroke-width':'1.5'
}));

// CORE - drawn on top so it covers inner rings
svg.appendChild(svgEl('circle',{cx:cx,cy:cy,r:coreR,fill:'url(#cg)'}));

// ADAPTED SELF LABEL
var osMidR=(outerR+cR)/2;
var osLabelY=cy-osMidR-7;
svg.appendChild(svgEl('rect',{
  x:cx-100,y:osLabelY-12,width:'200',height:'32',
  rx:'4',fill:'#FFFFFF',opacity:'0.9'
}));
svgTxt(cx, osLabelY, 'ADAPTED SELF', {
  'text-anchor':'middle','font-size':'12','font-weight':'700',
  'letter-spacing':'1.5',fill:SC[overallState].solid,'font-family':'DM Sans, sans-serif'
});
svgTxt(cx, osLabelY+15, overallState + ' — ' + overallPct + '% resistance', {
  'text-anchor':'middle','font-size':'11','font-weight':'600',
  'letter-spacing':'0.5',fill:SC[overallState].solid,'font-family':'DM Sans, sans-serif'
});

// B/R/C LABELS
[
  {midR:(coreR+bR)/2, letter:'B', state:bState},
  {midR:(bR+rR)/2,    letter:'R', state:rState},
  {midR:(rR+cR)/2,    letter:'C', state:cState}
].forEach(function(d){
  var lx=cx+d.midR, ly=cy;
  svg.appendChild(svgEl('circle',{cx:lx,cy:ly,r:'14',fill:'#FFFFFF',stroke:SC[d.state].solid,'stroke-width':'2'}));
  svgTxt(lx, ly+5, d.letter, {
    'text-anchor':'middle','font-size':'13','font-weight':'700',
    fill:SC[d.state].solid,'font-family':'DM Sans, sans-serif'
  });
});

// STATE PROGRESSION STRIP - shows all states up to and including current state
var stripHeight = 20;
var stripY = svgH - stripHeight - 4;
var stripWidth = svgW;

// Build array of states from Coherent through current state
var progressionStates = [];
for(var i=0; i<=stateIndex; i++){
  progressionStates.push(stateOrder[i]);
}

// Each state gets equal width
var blockWidth = stripWidth / progressionStates.length;

for(var i=0; i<progressionStates.length; i++){
  var stateName = progressionStates[i];
  svg.appendChild(svgEl('rect',{
    x: i * blockWidth,
    y: stripY,
    width: blockWidth,
    height: stripHeight,
    fill: SC[stateName].solid,
    opacity: '0.85'
  }));
}

// VITRUVIAN FIGURE - FIXED SIZE
var figureHeight = 133;
var figColor = 'rgba(255,255,255,0.75)';

// Proportions
var headR = figureHeight * 0.13;
var neckH = headR * 0.4;
var torsoH = figureHeight * 0.45;
var legH = figureHeight * 0.3;
var shoulderW = headR * 2.2;
var waistW = headR * 3.6;
var hipW = headR * 1.8;

// Calculate vertical positions
var headCy = cy - torsoH - neckH - headR;
var neckTop = cy - torsoH - neckH;
var neckBottom = cy - torsoH;
var waistY = cy - (torsoH * 0.4);
var hipY = cy;

// Head
svg.appendChild(svgEl('circle',{
  cx:cx, cy:headCy, r:headR,
  fill:figColor, stroke:'rgba(255,255,255,0.95)', 'stroke-width':'1.5'
}));

// Neck
svg.appendChild(svgEl('rect',{
  x:cx-(headR*0.35), y:neckTop, width:headR*0.7, height:neckH,
  fill:figColor, stroke:'rgba(255,255,255,0.95)', 'stroke-width':'1.5'
}));

// Torso
var torsoPath = 
  'M '+(cx-shoulderW/2)+','+neckBottom+' '+
  'L '+(cx+shoulderW/2)+','+neckBottom+' '+
  'L '+(cx+waistW/2)+','+waistY+' '+
  'L '+(cx+hipW/2)+','+hipY+' '+
  'L '+(cx-hipW/2)+','+hipY+' '+
  'L '+(cx-waistW/2)+','+waistY+' Z';

svg.appendChild(svgEl('path',{
  d:torsoPath,
  fill:figColor, stroke:'rgba(255,255,255,0.95)', 'stroke-width':'1.5',
  'stroke-linejoin':'round'
}));

// COHERENT CORE text
svgTxt(cx, waistY+3, 'COHERENT', {
  'text-anchor':'middle','font-size':'9','font-weight':'700',
  'letter-spacing':'1.4',fill:'rgba(0,0,0,0.75)','font-family':'DM Sans, sans-serif'
});
svgTxt(cx, waistY+13, 'CORE', {
  'text-anchor':'middle','font-size':'9','font-weight':'700',
  'letter-spacing':'1.4',fill:'rgba(0,0,0,0.75)','font-family':'DM Sans, sans-serif'
});

// Arms - fixed reach
var armW = 204;
var shoulderY = neckBottom + (torsoH * 0.1);
var armThick = headR * 0.35;
svg.appendChild(svgEl('line',{
  x1:cx-shoulderW/2, y1:shoulderY, x2:cx-armW/2, y2:shoulderY-headR*0.5,
  stroke:figColor, 'stroke-width':armThick, 'stroke-linecap':'round'
}));
svg.appendChild(svgEl('line',{
  x1:cx+shoulderW/2, y1:shoulderY, x2:cx+armW/2, y2:shoulderY-headR*0.5,
  stroke:figColor, 'stroke-width':armThick, 'stroke-linecap':'round'
}));

// Legs
var legThick = headR * 0.4;
var legSpread = headR * 2;
svg.appendChild(svgEl('line',{
  x1:cx-hipW/2, y1:hipY, x2:cx-legSpread, y2:cy+legH,
  stroke:figColor, 'stroke-width':legThick, 'stroke-linecap':'round'
}));
svg.appendChild(svgEl('line',{
  x1:cx+hipW/2, y1:hipY, x2:cx+legSpread, y2:cy+legH,
  stroke:figColor, 'stroke-width':legThick, 'stroke-linecap':'round'
}));

</script>
</body>
</html>
